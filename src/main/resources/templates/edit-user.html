<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit User</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/assets/app-theme.css}" rel="stylesheet">
</head>
<body>
<div class="container app-shell">
    <div class="app-hero mb-4">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <h2 class="page-title">Edit User</h2>
                <p class="mb-0">Update account details and platform access for <strong th:text="${managedUser.username}"></strong>.</p>
            </div>
            <a th:href="@{/users}" class="btn btn-outline-light">Back to Users</a>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card app-card border-0">
                <div class="card-header app-gradient-warm">
                    <h4 class="mb-0">Edit User</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/updateUser}" method="post">
                        <input type="hidden" name="originalUsername" th:value="${managedUser.username}">

                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" name="username" class="form-control" th:value="${managedUser.username}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="text" name="password" class="form-control" th:value="${managedUser.password}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Role</label>
                            <select name="role" class="form-select" required>
                                <option value="OPERATOR" th:selected="${#strings.equalsIgnoreCase(managedUser.role, 'OPERATOR')}">Bike Owner / Rental Provider</option>
                                <option value="RIDE_SHARER" th:selected="${#strings.equalsIgnoreCase(managedUser.role, 'RIDE_SHARER')}">Ride Sharer</option>
                                <option value="RIDE_BOOKER" th:selected="${#strings.equalsIgnoreCase(managedUser.role, 'RIDE_BOOKER')}">Ride Booker / Passenger</option>
                                <option value="RIDER" th:selected="${#strings.equalsIgnoreCase(managedUser.role, 'RIDER')}">Legacy Rider</option>
                                <option value="ADMIN" th:selected="${#strings.equalsIgnoreCase(managedUser.role, 'ADMIN')}">Admin</option>
                            </select>
                        </div>
                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/users}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-warning">Update User</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
