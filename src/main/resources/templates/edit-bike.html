<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Bike</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/assets/app-theme.css}" rel="stylesheet">
</head>
<body>
<div class="container app-shell">
    <div class="app-hero mb-4">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <h2 class="page-title">Edit Bike</h2>
                <p class="mb-0">Update the fleet entry for <strong th:text="${bike.bikeName}"></strong>.</p>
            </div>
            <a th:href="@{/bikes}" class="btn btn-outline-light">Back to Bikes</a>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card app-card border-0">
                <div class="card-header app-gradient-warm">
                    <h4 class="mb-0">Edit Bike</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/updateBike}" method="post">
                        <input type="hidden" name="id" th:value="${bike.id}">

                        <div class="mb-3">
                            <label class="form-label">Bike Name</label>
                            <input type="text" name="bikeName" th:value="${bike.bikeName}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bike Type</label>
                            <input type="text" name="bikeType" th:value="${bike.bikeType}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Location</label>
                            <input type="text" name="station" th:value="${bike.station}" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="tel" name="phoneNumber" th:value="${bike.phoneNumber}" class="form-control" placeholder="Contact number for renters" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Hourly Rate (LKR)</label>
                            <input type="number" step="0.01" min="0" name="hourlyRate" th:value="${bike.hourlyRate}" class="form-control" placeholder="Amount in LKR" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select" required>
                                <option value="AVAILABLE" th:selected="${#strings.equalsIgnoreCase(bike.status, 'AVAILABLE')}">Available</option>
                                <option value="BOOKED" th:selected="${#strings.equalsIgnoreCase(bike.status, 'BOOKED')}">Booked</option>
                                <option value="IN_SERVICE" th:selected="${#strings.equalsIgnoreCase(bike.status, 'IN_SERVICE')}">In Service</option>
                                <option value="MAINTENANCE" th:selected="${#strings.equalsIgnoreCase(bike.status, 'MAINTENANCE')}">Maintenance</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Managed By</label>
                            <input type="text" th:value="${bike.operator}" class="form-control" disabled>
                        </div>

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/bikes}" class="btn btn-secondary me-2">Cancel</a>
                            <button type="submit" class="btn btn-warning">Update Bike</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
