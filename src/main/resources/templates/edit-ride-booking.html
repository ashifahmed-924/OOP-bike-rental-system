<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Ride Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/assets/app-theme.css}" rel="stylesheet">
</head>
<body>
<div class="container app-shell">
    <div class="app-hero mb-4">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <h2 class="page-title">Edit Ride Booking</h2>
                <p class="mb-0">Adjust the ride details for booking <strong th:text="'#' + ${booking.id}"></strong>.</p>
            </div>
            <a th:href="@{/rideBookings}" class="btn btn-outline-light">Back to Rides</a>
        </div>
    </div>
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card app-card border-0">
                <div class="card-header app-gradient-warm">
                    <h4 class="mb-0">Edit Ride Booking</h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/updateRideBooking}" method="post">
                        <input type="hidden" name="id" th:value="${booking.id}">
                        <input type="hidden" name="bikeId" th:value="${booking.bikeId}">
                        <input type="hidden" name="bikeName" th:value="${booking.bikeName}">
                        <input type="hidden" name="username" th:value="${booking.username}">

                        <div class="mb-3">
                            <label class="form-label">Bike</label>
                            <input type="text" class="form-control" th:value="${booking.bikeName}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Booked By</label>
                            <input type="text" class="form-control" th:value="${booking.username}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Hours</label>
                            <input type="number" name="durationHours" class="form-control" min="1" th:value="${booking.durationHours}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bike Pickup Time</label>
                            <input type="time" class="form-control" th:value="${booking.rentalPickupTime}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bike Return Time</label>
                            <input type="time" class="form-control" th:value="${booking.rentalReturnTime}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Renter Phone Number</label>
                            <input type="text" class="form-control" th:value="${booking.renterPhoneNumber}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Pickup Point</label>
                            <input type="text" name="pickupPoint" class="form-control" th:value="${booking.pickupPoint}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Drop-off Point</label>
                            <input type="text" name="dropPoint" class="form-control" th:value="${booking.dropPoint}" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Status</label>
                            <select name="status" class="form-select" required>
                                <option value="PENDING_OWNER_APPROVAL" th:selected="${#strings.equalsIgnoreCase(booking.status, 'PENDING_OWNER_APPROVAL')}">Waiting for Owner Approval</option>
                                <option value="REQUESTED" th:selected="${#strings.equalsIgnoreCase(booking.status, 'REQUESTED')}">Requested</option>
                                <option value="OPEN_TO_SHARE" th:selected="${#strings.equalsIgnoreCase(booking.status, 'OPEN_TO_SHARE')}">Open to Share</option>
                                <option value="CONFIRMED" th:selected="${#strings.equalsIgnoreCase(booking.status, 'CONFIRMED')}">Confirmed</option>
                                <option value="COMPLETED" th:selected="${#strings.equalsIgnoreCase(booking.status, 'COMPLETED')}">Completed</option>
                                <option value="CANCELLED" th:selected="${#strings.equalsIgnoreCase(booking.status, 'CANCELLED')}">Cancelled</option>
                            </select>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <a th:href="@{/rideBookings}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-warning">Update Ride Booking</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
